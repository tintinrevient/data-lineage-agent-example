version: 2

models:
  - name: stg_orders
    description: Staged orders from the TESTUSER.ORDERS source table
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: customer_id
        tests: [not_null]
      - name: status
        tests: [not_null]

  - name: stg_customers
    description: Staged customers from the TESTUSER.CUSTOMERS source table
    columns:
      - name: customer_id
        tests: [unique, not_null]
      - name: email
        tests: [unique, not_null]
      - name: customer_name
        tests: [not_null]

  - name: stg_order_items
    description: Staged order line items from the TESTUSER.ORDER_ITEMS source table
    columns:
      - name: order_item_id
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: line_total
        description: quantity * unit_price computed at staging
